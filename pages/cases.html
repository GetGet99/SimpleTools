<!DOCTYPE html>
<html style="color-scheme: dark light;">

<head>
    <!--please don't burn my eyes-->
    <script src="../auto_dark.js"></script>
    <meta name="color-scheme" content="dark light">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="../style.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <title>Cases</title>
</head>

<body>
    <noscript>
        <a href="../index.html">Back to home</a>
    </noscript>
    <div class="d-flex">
        <main id="main" class="row mx-sm-auto" style="width: 100%; max-width: 600px;">
            <div class="col-12 m-2">
                <textarea id="inouttext" class="form-control mx-auto" style="resize: vertical; height: 250px;"
                    autocomplete="off"></textarea>
            </div>
            <div class="col-12 mx-2 row justify-content-center">
                <button id="lowercase" type="button" class="col-sm-2 btn btn-primary">Lowercase</button>
                <button id="uppercase" type="button" class="col-sm-2 btn btn-primary mx-2 my-2 my-sm-0">Uppercase</button>
                <button id="swappingcase" type="button" class="col-sm-3 btn btn-primary">Sawppingcase</button>
                <button id="randomcase" type="button" class="col-sm-3 btn btn-primary mx-2 my-2 my-sm-0">Randomcase</button>
                <button id="copyBtn" class="col-sm-1 btn btn-primary">
                    <i class="bi bi-copy"></i>
                </button>
            </div>
        </main>
        <div class="modal" id="errormodal">
            <div class="modal-dialog">
                <div class="modal-content">

                    <!-- Modal Header -->
                    <div class="modal-header">
                        <h4 class="modal-title">Error</h4>
                        <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                    </div>

                    <!-- Modal body -->
                    <div class="modal-body" id="errortext">

                    </div>

                    <!-- Modal footer -->
                    <div class="modal-footer">
                        <button type="button" class="btn btn-danger" data-bs-dismiss="modal">Okay</button>
                    </div>

                </div>
            </div>
        </div>
    </div>
</body>
<script src="../setup.js"></script>
<script src="cases_export.js"></script><!--Requires RNG lib-->
<script src="cases.js"></script>

</html>
