<!DOCTYPE html>
<html style="color-scheme: dark light;">

<head>
    <meta name="color-scheme" content="dark light">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <title>Random Number Generator</title>
</head>

<body>
    <noscript>
        <a href="../index.html">Back to home</a>
    </noscript>
    <div class="d-flex">
        <div id="main" class="row w-25 mx-auto">
            <div class="col-12 mb-2 mx-2">
                <span class="text-center d-block">Generate me a random number</span>
            </div>
            <div class="col-12 m-2">
                <div class="btn-group w-100">
                    <button id="intModeBtn" type="button" class="btn btn-primary text-white w-50">Integer</button>
                    <button id="floatModeBtn" type="button" class="btn btn-outline-primary text-white w-50">Real
                        Number</button>
                </div>
            </div>
            <div class="col-12 m-2">
                <div class="input-group mx-auto">
                    <span class="input-group-text">From</span>
                    <input id="fromtb" type="number" class="form-control" placeholder="From" value="1">
                    <span class="input-group-text">To</span>
                    <input id="totb" type="number" class="form-control" placeholder="To" value="10">
                </div>
            </div>
            <div class="col-12 m-2">
                <div class="input-group mx-auto">
                    <button id="genBtn" class="btn btn-primary mx-auto">Generate!</button>
                    <span class="input-group-text">x</span>
                    <input id="genCounttb" type="number" class="form-control" placeholder="Number of random numbers"
                        value="1">
                </div>
            </div>
            <div class="col-12 m-2">
                <textarea id="output" class="form-control mx-auto" style="resize: vertical; height: 250px;"
                    readonly></textarea>
            </div>
            <div class="col-12 mx-2 d-flex justify-content-end">
                <button id="clearBtn" class="btn btn-primary">
                    <i class="bi bi-trash"></i>
                </button>
                <button id="copyBtn" class="btn btn-primary ms-2">
                    <i class="bi bi-copy"></i>
                </button>
            </div>
        </div>
        <div class="modal" id="errormodal">
            <div class="modal-dialog">
                <div class="modal-content">

                    <!-- Modal Header -->
                    <div class="modal-header">
                        <h4 class="modal-title">Error</h4>
                        <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                    </div>

                    <!-- Modal body -->
                    <div class="modal-body" id="errortext">

                    </div>

                    <!-- Modal footer -->
                    <div class="modal-footer">
                        <button type="button" class="btn btn-danger" data-bs-dismiss="modal">Okay</button>
                    </div>

                </div>
            </div>
        </div>
    </div>
</body>
<script src="../setup.js"></script>
<script src="rng_export.js"></script><!--Requires RNG lib-->
<script src="rng.js"></script>

</html>
