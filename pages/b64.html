<!DOCTYPE html>
<html style="color-scheme: dark light;">

<head>
    <!--please don't burn my eyes-->
    <script src="../auto_dark.js"></script>
    <meta name="color-scheme" content="dark light">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="../style.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <title>Base 64 Converter</title>
</head>

<body>
    <noscript>
        <a href="../">Back to home</a>
    </noscript>
    <main id="main">
        <div class="row m-2 m-sm-0">
            <div class="col-md text-lg-center align-content-center" style="text-align: right !important;">
                <input class="form-control d-inline-block w-sm-50" type="text" placeholder="Normal Text (B)" id="lefttb" autocomplete="off" />
            </div>
            <div class="col-md-1 text-center align-content-center my-4 my-sm-0">
                <button class="btn btn-primary" id="switchbtn">
                    <i class="bi bi-arrow-left-right"></i>
                </button>
            </div>
            <div class="col-md align-content-center">
                <div class="input-group w-sm-50">
                    <input class="form-control" type="text" placeholder="Base 64 (A)" id="righttb"
                        readonly="readonly" autocomplete="off" />
                    <button class="btn btn-primary" id="copybtn">
                        <i class="bi bi-copy"></i>
                    </button>
                </div>
            </div>
        </div>
    </main>
    <div class="modal" id="errormodal">
        <div class="modal-dialog">
            <div class="modal-content">

                <!-- Modal Header -->
                <div class="modal-header">
                    <h4 class="modal-title">Error</h4>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>

                <!-- Modal body -->
                <div class="modal-body" id="errortext">

                </div>

                <!-- Modal footer -->
                <div class="modal-footer">
                    <button type="button" class="btn btn-danger" data-bs-dismiss="modal">Okay</button>
                </div>

            </div>
        </div>
    </div>
</body>
<script src="../setup.js"></script>
<script src="b64.js"></script>

</html>
